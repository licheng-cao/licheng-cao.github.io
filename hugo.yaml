baseURL: https://licheng-cao.github.io/
locale: en-US
title: Licheng Cao

module:
  imports:
    - path: github.com/imfing/hextra

taxonomies:
  category: categories
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Research
      pageRef: /research
      weight: 2
    - name: Field
      pageRef: /field
      weight: 3
    - name: Publication
      pageRef: /publication
      weight: 4
    - name: Team
      pageRef: /team
      weight: 5
    - name: Blog
      pageRef: /blog
      weight: 6
    - name: CV
      pageRef: /cv
      weight: 7
    - name: GitHub
      url: https://github.com/licheng-cao/licheng-cao.github.io
      weight: 8
      params:
        icon: github

params:
  description: Personal academic website of Licheng Cao.
  navbar:
    displayTitle: true
    displayLogo: false
    width: wide
  page:
    width: wide
  footer:
    width: wide
  theme:
    default: system
    displayToggle: true
  blog:
    list:
      displayTags: true
    article:
      displayPagination: true
  toc:
    displayTags: true
  search:
    enable: false
    type: flexsearch
    flexsearch:
      index: content
  imageZoom:
    enable: false
  editURL:
    enable: true
    base: https://github.com/licheng-cao/licheng-cao.github.io/edit/main
  externalLinkDecoration: true

caches:
  images:
    dir: :cacheDir/images
